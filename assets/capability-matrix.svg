<circle cx='770' cy='146' r='10' fill='#238636'/><path transform='translate(770,146)' d='M-4 0.5 l3 3 l7 -7.5' fill='none' stroke='#ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>
<text class='ft' x='36' y='187'>Snapshots · backup · restore</text>
<circle cx='620' cy='182' r='10' fill='#238636'/><path transform='translate(620,182)' d='M-4 0.5 l3 3 l7 -7.5' fill='none' stroke='#ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>
<circle cx='770' cy='182' r='10' fill='#238636'/><path transform='translate(770,182)' d='M-4 0.5 l3 3 l7 -7.5' fill='none' stroke='#ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>
<text class='ft' x='36' y='223'>Storage &amp; cluster inspection</text>
<circle cx='620' cy='218' r='10' fill='#238636'/><path transform='translate(620,218)' d='M-4 0.5 l3 3 l7 -7.5' fill='none' stroke='#ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>
<circle cx='770' cy='218' r='10' fill='#238636'/><path transform='translate(770,218)' d='M-4 0.5 l3 3 l7 -7.5' fill='none' stroke='#ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>
<text class='ft' x='36' y='259'>Full ZFS — pools, datasets, scrub, send</text>
<circle cx='620' cy='254' r='10' fill='#238636'/><path transform='translate(620,254)' d='M-4 0.5 l3 3 l7 -7.5' fill='none' stroke='#ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>
