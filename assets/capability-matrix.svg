<circle cx='770' cy='470' r='9.5' fill='none' stroke='#484f58' stroke-width='1.5'/>
<text class='ft' x='36' y='511'>Tamper-evident audit — hash-chained log</text>
<circle cx='620' cy='506' r='10' fill='#238636'/><path transform='translate(620,506)' d='M-4 0.5 l3 3 l7 -7.5' fill='none' stroke='#ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>
<circle cx='770' cy='506' r='9.5' fill='none' stroke='#484f58' stroke-width='1.5'/>
<circle cx='44' cy='548' r='7' fill='#238636'/><path transform='translate(44,548)' d='M-3 0.4 l2.2 2.2 l5 -5.4' fill='none' stroke='#ffffff' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/>
<text class='foot' x='57' y='552'>available</text>
<circle cx='150' cy='548' r='6.5' fill='none' stroke='#484f58' stroke-width='1.5'/>
<text class='foot' x='163' y='552'>not available</text>
<text class='foot' x='36' y='572'>“Typical MCP” = the usual API-wrapping servers, offering VM and container lifecycle only.</text>
<text class='foot' x='36' y='590'>Honesty: some (e.g. ProxmoxMCP-Plus) add HTTP/OpenAPI access and a job store the Suite lacks.</text>
</svg>
