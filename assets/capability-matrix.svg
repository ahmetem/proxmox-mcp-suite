<circle cx='620' cy='362' r='10' fill='#238636'/><path transform='translate(620,362)' d='M-4 0.5 l3 3 l7 -7.5' fill='none' stroke='#ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>
