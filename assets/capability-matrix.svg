<circle cx='770' cy='398' r='9.5' fill='none' stroke='#484f58' stroke-width='1.5'/>
<text class='ft' x='36' y='439'>Token-efficiency — 1-call health, compact, fields[]</text>
<circle cx='620' cy='434' r='10' fill='#238636'/><path transform='translate(620,434)' d='M-4 0.5 l3 3 l7 -7.5' fill='none' stroke='#ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>
<circle cx='770' cy='434' r='9.5' fill='none' stroke='#484f58' stroke-width='1.5'/>
