<rect x='14' y='272' width='852' height='36' fill='#161b22'/>
<rect x='14' y='344' width='852' height='36' fill='#161b22'/>
<rect x='14' y='416' width='852' height='36' fill='#161b22'/>
<rect x='14' y='488' width='852' height='36' fill='#161b22'/>
<text class='ft' x='36' y='151'>Guest creation — VM &amp; LXC</text>
