<svg viewBox='0 0 880 596' xmlns='http://www.w3.org/2000/svg' role='img' width='100%'>
<title>Capability comparison: Proxmox MCP Suite versus a typical Proxmox MCP</title>
<desc>A feature table. Both a typical Proxmox MCP and the Suite cover guest creation, snapshots, backup, restore and storage inspection. Only the Suite adds full ZFS, LVM, disk SMART, host shell exec, Proxmox Backup Server, token-efficiency, dry-run previews and a tamper-evident audit.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
.ttl{font-size:23px;font-weight:700;fill:#e6edf3;}
.sub{font-size:13px;fill:#8b949e;}
.ft{font-size:14px;fill:#c9d1d9;}
.ch{font-size:12.5px;font-weight:700;}
.suite{fill:#a371f7;}
.plus{fill:#8b949e;}
.foot{font-size:12px;fill:#8b949e;}
</style>
<rect x='1' y='1' width='878' height='594' rx='14' fill='#0d1117' stroke='#30363d'/>
<text class='ttl' x='36' y='46'>Capability comparison</text>
<text class='sub' x='36' y='70'>Proxmox MCP Suite vs a typical Proxmox MCP server</text>
<line x1='36' y1='86' x2='844' y2='86' stroke='#21262d'/>
<text class='ch suite' x='620' y='106' text-anchor='middle'>Proxmox MCP</text>
<text class='ch suite' x='620' y='121' text-anchor='middle'>Suite</text>
<text class='ch plus' x='770' y='106' text-anchor='middle'>Typical</text>
<text class='ch plus' x='770' y='121' text-anchor='middle'>MCP</text>
<line x1='36' y1='128' x2='844' y2='128' stroke='#21262d'/>
