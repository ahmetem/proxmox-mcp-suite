<svg viewBox='0 0 1200 660' xmlns='http://www.w3.org/2000/svg' role='img' aria-labelledby='t d'>
<title id='t'>Proxmox MCP Suite architecture</title>
<desc id='d'>MCP clients reach the proxmox-mcp-suite marketplace over stdio. It holds two servers — proxmox-ve (52 tools) and proxmox-backup (17 tools) — behind a safety layer, driving Proxmox VE over REST and SSH and Proxmox Backup Server over REST.</desc>
<defs>
<filter id='sh' x='-20%' y='-20%' width='140%' height='150%'><feDropShadow dx='0' dy='6' stdDeviation='8' flood-color='#000000' flood-opacity='0.5'/></filter>
